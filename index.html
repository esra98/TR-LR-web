<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TR Lip-Reading — Sonuçlar</title>
<style>
  :root {
    --bg: #0f172a;
    --panel: #1e293b;
    --panel-2: #273449;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #60a5fa;
    --good: #34d399;
    --warn: #fbbf24;
    --bad: #f87171;
    --border: #334155;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  header {
    padding: 1rem 1.25rem; border-bottom: 1px solid var(--border);
    display: flex; flex-wrap: wrap; gap: .75rem; align-items: center; justify-content: space-between;
    background: linear-gradient(180deg, #111827, var(--bg));
  }
  header h1 { font-size: 1.05rem; margin: 0; font-weight: 600; letter-spacing: .3px; }
  header .meta { color: var(--muted); font-size: .85rem; }
  main {
    max-width: 1100px; margin: 0 auto; padding: 1rem;
    display: grid; grid-template-columns: 280px 1fr; gap: 1rem;
  }
  @media (max-width: 800px) {
    main { grid-template-columns: 1fr; }
    aside { order: 2; }
  }
  aside {
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    padding: .75rem; max-height: 75vh; overflow: auto;
  }
  aside h2 { font-size: .85rem; margin: 0 0 .5rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .item-list { list-style: none; padding: 0; margin: 0; }
  .item-list li {
    padding: .5rem .6rem; border-radius: 6px; cursor: pointer;
    display: flex; justify-content: space-between; gap: .5rem;
    font-size: .9rem; color: var(--text); transition: background .15s;
  }
  .item-list li:hover { background: var(--panel-2); }
  .item-list li.active { background: var(--accent); color: #0b1220; font-weight: 600; }
  .item-list .wer { color: var(--muted); font-variant-numeric: tabular-nums; font-size: .8rem; }
  .item-list li.active .wer { color: #0b1220; }

  section.viewer {
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    padding: 1rem; display: flex; flex-direction: column; gap: 1rem;
  }
  .video-wrap {
    position: relative; background: #000; border-radius: 8px; overflow: hidden;
    aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center;
  }
  video { width: 100%; height: 100%; object-fit: contain; background: #000; }
  .row { display: grid; grid-template-columns: 90px 1fr; gap: .75rem; align-items: start; }
  .row .label { color: var(--muted); font-size: .8rem; text-transform: uppercase; letter-spacing: 1px; padding-top: .15rem; }
  .row .value { font-size: 1rem; line-height: 1.45; word-break: break-word; }
  .real { color: #f1f5f9; }
  .forecast { color: #fde68a; }

  .wer-badge {
    display: inline-block; padding: .25rem .55rem; border-radius: 999px; font-weight: 600;
    font-variant-numeric: tabular-nums; font-size: .85rem;
  }
  .wer-good { background: rgba(52,211,153,.15); color: var(--good); }
  .wer-warn { background: rgba(251,191,36,.15); color: var(--warn); }
  .wer-bad  { background: rgba(248,113,113,.15); color: var(--bad); }

  .controls {
    display: flex; gap: .5rem; align-items: center; flex-wrap: wrap;
  }
  button {
    background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
    padding: .5rem .9rem; border-radius: 6px; cursor: pointer; font-size: .9rem;
  }
  button:hover { background: #334155; }
  button:disabled { opacity: .4; cursor: not-allowed; }
  .pos { color: var(--muted); font-size: .85rem; margin-left: auto; }
  .footer-hint { color: var(--muted); font-size: .75rem; margin-top: .25rem; }
  code { background: var(--panel-2); padding: .1rem .35rem; border-radius: 4px; font-size: .8rem; }
</style>
</head>
<body>
<header>
  <h1>🇹🇷 Türkçe Dudak Okuma — Sonuç İncele</h1>
  <div class="meta" id="meta">yükleniyor…</div>
</header>

<main>
  <aside>
    <h2>Seçilen 100 video</h2>
    <ul class="item-list" id="list"></ul>
  </aside>

  <section class="viewer">
    <div class="video-wrap">
      <video id="player" muted playsinline controls preload="metadata"></video>
    </div>

    <div class="row">
      <span class="label">WER</span>
      <span><span id="wer" class="wer-badge wer-bad">—</span></span>
    </div>
    <div class="row">
      <span class="label">Gerçek</span>
      <span class="value real" id="real">—</span>
    </div>
    <div class="row">
      <span class="label">Tahmin</span>
      <span class="value forecast" id="forecast">—</span>
    </div>

    <div class="controls">
      <button id="prev">← Önceki</button>
      <button id="next">Sonraki →</button>
      <span class="pos" id="pos"></span>
    </div>
  </section>
</main>

<script src="data.js"></script>
<script src="selection.js"></script>
<script>
(function () {
  const $ = (id) => document.getElementById(id);
  const list = $('list'), player = $('player');
  const real = $('real'), forecast = $('forecast'), werEl = $('wer');
  const pos = $('pos'), meta = $('meta');

  const data = window.DATA, selection = window.SELECTION;
  if (!data || !selection) {
    meta.textContent = 'Veri yüklenemedi (data.js / selection.js eksik).';
    return;
  }

  let items, current = 0;

  // Map index -> entry; selection contains video numbers (0..999)
  const byIdx = new Map(data.items.map(it => [it.n, it]));
  items = selection
    .map(n => byIdx.get(n))
    .filter(Boolean);

  meta.textContent = `${items.length} / ${selection.length} video • Avg WER: ${data.avg_wer}%`;

  function werClass(w) {
    if (w <= 30) return 'wer-good';
    if (w <= 70) return 'wer-warn';
    return 'wer-bad';
  }

  function renderList() {
    list.innerHTML = '';
    items.forEach((it, i) => {
      const li = document.createElement('li');
      li.dataset.i = i;
      if (i === current) li.classList.add('active');
      li.innerHTML = `<span>#${String(it.n).padStart(3,'0')} <span style="opacity:.6">(${it.id})</span></span>
                      <span class="wer">${it.wer.toFixed(1)}%</span>`;
      li.addEventListener('click', () => show(i));
      list.appendChild(li);
    });
  }

  function show(i) {
    if (i < 0 || i >= items.length) return;
    current = i;
    const it = items[i];
    real.textContent = it.real || '—';
    forecast.textContent = it.forecast || '—';
    werEl.textContent = it.wer.toFixed(1) + '%';
    werEl.className = 'wer-badge ' + werClass(it.wer);
    player.src = `test-videos/${it.id}.mp4`;
    player.load();
    pos.textContent = `${i + 1} / ${items.length}`;
    [...list.children].forEach((li, idx) =>
      li.classList.toggle('active', idx === i));
    const active = list.children[i];
    if (active) active.scrollIntoView({ block: 'nearest' });
  }

  $('prev').addEventListener('click', () => show(current - 1));
  $('next').addEventListener('click', () => show(current + 1));
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') show(current - 1);
    else if (e.key === 'ArrowRight') show(current + 1);
  });

  renderList();
  show(0);
})();
</script>
</body>
</html>
